###
### KewlChats ejabberd config (Phase 2).
###
### Source of truth lives here in the repo and is symlinked to the ejabberd config
### path (brew: /opt/homebrew/etc/ejabberd/ejabberd.yml). Reflects the locked
### decisions in ~/Herd/kewlchats/CLAUDE.md:
###   - MAM OFF (no message archive)            -> no mod_mam
###   - Federation OFF (closed network)         -> no s2s listener, no mod_s2s_*
###   - Carbons ON (live multi-device)          -> mod_carboncopy
###   - Short offline spool (delivered once)    -> mod_offline, small cap
###   - In-band registration DENIED             -> mod_register access: none
###   - Near-zero MUC history ("be there")      -> mod_muc history_size: 0
### Dev uses Mnesia (internal auth); prod swaps in MySQL.
###

## Dev vhost is kewlchats.corp (resolves over Tailscale, so phone apps can connect).
## Prod swaps this to kewlchats.net.
hosts:
  - kewlchats.corp

loglevel: info

auth_method: internal

## Dev: ejabberd auto-generates a self-signed cert when none is listed.
## Prod: REUSE the website's Let's Encrypt cert (same hostname) — don't issue a second.
## Only c2s (5222) uses this; wss is terminated by nginx, TURN needs no cert. ejabberd
## caches certs in memory, so run `ejabberdctl reload_config` from the LE renewal hook.
# certfiles:
#   - /path/to/kewlchats.net/fullchain.pem
#   - /path/to/kewlchats.net/privkey.pem

## OAuth: lets Laravel mint short-lived tokens for the browser chat client
## (X-OAUTH2) and authenticate the ReST API with a bearer token.
oauth_access: all
oauth_expire: 31536000

listen:
  -
    port: 5222
    ip: "::"
    module: ejabberd_c2s
    max_stanza_size: 262144
    shaper: c2s_shaper
    access: c2s
    starttls_required: true
  -
    ## Plain HTTP on loopback — the Laravel ReST calls and (dev) WebSocket land here.
    port: 5280
    ip: "::"
    module: ejabberd_http
    request_handlers:
      /admin: ejabberd_web_admin
      /api: mod_http_api
      /bosh: mod_bosh
      /ws: ejabberd_http_ws
      /.well-known/acme-challenge: ejabberd_acme
  -
    ## HTTPS (self-signed in dev; Let's Encrypt in prod).
    port: 5443
    ip: "::"
    module: ejabberd_http
    tls: true
    request_handlers:
      /admin: ejabberd_web_admin
      /api: mod_http_api
      /bosh: mod_bosh
      /ws: ejabberd_http_ws
  -
    ## Built-in STUN/TURN for Jingle voice/video (no coturn needed). Paired with
    ## mod_stun_disco, which hands clients short-lived TURN creds via XEP-0215.
    port: 5478
    transport: udp
    module: ejabberd_stun
    use_turn: true
    ## The address the TURN relay advertises. Dev = this box's Tailscale IP (reachable
    ## across the tailnet); prod = the server's public IPv4.
    turn_ipv4_address: "100.92.49.99"
    ## Relay UDP port range (keep it open on the firewall).
    turn_min_port: 49152
    turn_max_port: 65535

## --- Federation OFF: no 5269 s2s listener, no s2s modules. ---

acl:
  local:
    user_regexp: ""
  loopback:
    ip:
      - 127.0.0.0/8
      - ::1/128
  admin:
    user:
      - "admin@kewlchats.corp"

access_rules:
  local:
    allow: local
  c2s:
    deny: blocked
    allow: all
  announce:
    allow: admin
  configure:
    allow: admin
  muc_create:
    allow: local
  pubsub_createnode:
    allow: local
  trusted_network:
    allow: loopback

api_permissions:
  "console commands":
    from: ejabberd_ctl
    who: all
    what: "*"
  "webadmin commands":
    from: ejabberd_web_admin
    who: admin
    what: "*"
  "http api":
    from: mod_http_api
    who:
      access:
        allow:
          - acl: loopback
          - acl: admin
      oauth:
        scope: "ejabberd:admin"
        access:
          allow:
            - acl: loopback
            - acl: admin
    what:
      - "*"
      - "!stop"
      - "!start"

shaper:
  normal:
    rate: 3000
    burst_size: 20000
  fast: 100000

shaper_rules:
  max_user_sessions: 10
  max_user_offline_messages:
    100: all
  c2s_shaper:
    none: admin
    normal: all

modules:
  mod_adhoc: {}
  mod_adhoc_api: {}
  mod_admin_extra: {}
  mod_announce:
    access: announce
  mod_avatar: {}
  mod_blocking: {}
  mod_bosh: {}
  mod_caps: {}
  mod_carboncopy: {}        # Carbons ON — live multi-device without an archive
  mod_client_state: {}
  mod_configure: {}
  mod_disco: {}
  mod_fail2ban: {}
  mod_http_api: {}
  mod_last: {}              # backs get_last -> lastActivity()
  mod_muc:
    access:
      - allow
    access_admin:
      - allow: admin
    access_create: muc_create
    access_persistent: muc_create
    history_size: 0         # near-zero scrollback — "you had to be there"
    default_room_options:
      mam: false
  mod_muc_admin: {}
  mod_offline:              # short-lived spool: delivered once, then gone
    access_max_user_messages: max_user_offline_messages
  mod_ping: {}
  mod_privacy: {}
  mod_private: {}
  mod_pubsub:
    access_createnode: pubsub_createnode
    plugins:
      - flat
      - pep
    force_node_config:
      storage:bookmarks:
        access_model: whitelist
  mod_push: {}
  mod_push_keepalive: {}
  mod_register:
    ## In-band registration DENIED — the website is the only way in.
    ## The admin `register` ReST command still works (it bypasses this).
    access: none
  mod_roster:
    versioning: true
  mod_shared_roster: {}
  mod_stream_mgmt:
    resend_on_timeout: if_offline
  mod_stun_disco: {}        # advertises the built-in STUN/TURN to clients (XEP-0215)
  mod_vcard: {}
  mod_vcard_xupdate: {}
  mod_version:
    show_os: false
  ## NO mod_mam (no archive). NO mod_s2s_* (federation off).
  ## NO mqtt / http_upload / proxy65 for now (add when needed).
