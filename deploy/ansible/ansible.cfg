[defaults]
inventory = inventory.ini
roles_path = roles
host_key_checking = True
retry_files_enabled = False
# `yaml` stdout callback (community.general) was removed in v12; the built-in
# default callback now renders results as YAML via result_format.
stdout_callback = default
result_format = yaml
interpreter_python = auto_silent
forks = 10

[ssh_connection]
pipelining = True
