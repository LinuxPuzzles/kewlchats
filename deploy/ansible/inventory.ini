# KewlChats production — single dedicated box.
# Replace the host below with your server's address (DNS name or IP).
#
# First run (box not yet on the tailnet): use the public IP/hostname.
# After Tailscale is enabled, SSH is gated to the tailnet — switch this to the
# box's Tailscale hostname (e.g. `kewlchats`) or its 100.x IP for subsequent runs.
[kewlchats]
kewlchats.net ansible_user=root

[kewlchats:vars]
# If you SSH as a non-root sudo user instead, set e.g.:
#   ansible_user=andy
#   ansible_become=true
ansible_become=true
ansible_python_interpreter=/usr/bin/python3
