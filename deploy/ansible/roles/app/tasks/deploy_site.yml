---
# Per-site deploy, looped from main.yml with loop_var `site`. Everything that
# touches the code runs AS the site's user ({{ site.name }}) so the checkout is
# owned by that user — git sees a repo it owns (no "dubious ownership"), and the
# tree stays isolated from other sites. HOME is set explicitly on every become
# task because `become_user` does NOT reset it (composer/npm/git would otherwise
# try to write into root's home).
- name: "[{{ site.name }}] Per-site path facts"
  ansible.builtin.set_fact:
    site_dir: "{{ app_root }}/{{ site.name }}"
    site_home: "{{ site_home_base }}/{{ site.name }}"
    site_key: "{{ site_home_base }}/{{ site.name }}/.ssh/kewlchats_deploy"

- name: "[{{ site.name }}] Ensure ~/.ssh exists"
  ansible.builtin.file:
    path: "{{ site_home }}/.ssh"
    state: directory
    owner: "{{ site.name }}"
    group: "{{ site.name }}"
    mode: "0700"

- name: "[{{ site.name }}] Install git deploy key (owned by the site user)"
  ansible.builtin.copy:
    src: deploy_key
    dest: "{{ site_key }}"
    owner: "{{ site.name }}"
    group: "{{ site.name }}"
    mode: "0600"

- name: "[{{ site.name }}] Ensure app directory exists (owned by the site user)"
  ansible.builtin.file:
    path: "{{ site_dir }}"
    state: directory
    owner: "{{ site.name }}"
    group: "{{ site.name }}"
    mode: "0755"

- name: "[{{ site.name }}] Clone / update the application"
  ansible.builtin.git:
    repo: "{{ git_repo_url }}"
    dest: "{{ site_dir }}"
    version: "{{ git_branch }}"
    key_file: "{{ site_key }}"
    accept_hostkey: true
    force: true
  become: true
  become_user: "{{ site.name }}"
  environment:
    HOME: "{{ site_home }}"
  register: site_checkout

# Detect whether the build artifacts exist, so an interrupted prior run (cloned
# but not built) still gets rebuilt even though git reports "no change".
- name: "[{{ site.name }}] Check for composer + built assets"
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ site_dir }}/vendor/autoload.php"
    - "{{ site_dir }}/public/build"
  register: build_artifacts

- name: "[{{ site.name }}] Set rebuild flags"
  ansible.builtin.set_fact:
    code_changed: "{{ site_checkout.changed }}"
    vendor_present: "{{ build_artifacts.results[0].stat.exists }}"
    assets_present: "{{ build_artifacts.results[1].stat.exists }}"

- name: "[{{ site.name }}] Install PHP dependencies (composer)"
  ansible.builtin.command:
    cmd: composer install --no-dev --optimize-autoloader --no-interaction
    chdir: "{{ site_dir }}"
  become: true
  become_user: "{{ site.name }}"
  environment:
    HOME: "{{ site_home }}"
    COMPOSER_HOME: "{{ site_home }}/.composer"
  when: code_changed or not vendor_present
  register: composer_install
  changed_when: "'Nothing to install' not in composer_install.stdout"

- name: "[{{ site.name }}] Install Node dependencies (npm ci)"
  ansible.builtin.command:
    cmd: npm ci
    chdir: "{{ site_dir }}"
  become: true
  become_user: "{{ site.name }}"
  environment:
    HOME: "{{ site_home }}"
  when: code_changed or not assets_present
  changed_when: true

- name: "[{{ site.name }}] Build front-end assets (Converse publish + Vite)"
  ansible.builtin.command:
    cmd: npm run build
    chdir: "{{ site_dir }}"
  become: true
  become_user: "{{ site.name }}"
  environment:
    HOME: "{{ site_home }}"
  when: code_changed or not assets_present
  changed_when: true

- name: "[{{ site.name }}] Render .env"
  ansible.builtin.template:
    src: env.j2
    dest: "{{ site_dir }}/.env"
    owner: "{{ site.name }}"
    group: "{{ site.name }}"
    mode: "0640"
  no_log: true
  register: env_render
  notify: Restart kewlchats workers

- name: "[{{ site.name }}] Ensure writable runtime directories"
  ansible.builtin.file:
    path: "{{ site_dir }}/{{ item }}"
    state: directory
    owner: "{{ site.name }}"
    group: "{{ site.name }}"
    mode: "0775"
    recurse: true
  loop:
    - storage
    - bootstrap/cache

- name: "[{{ site.name }}] Run database migrations"
  ansible.builtin.command:
    cmd: "php{{ php_version }} artisan migrate --force"
    chdir: "{{ site_dir }}"
  become: true
  become_user: "{{ site.name }}"
  environment:
    HOME: "{{ site_home }}"
  when: code_changed
  register: migrate_out
  changed_when: "'Nothing to migrate' not in migrate_out.stdout"

# config:cache bakes the .env into a compiled file, so re-cache whenever code OR
# the rendered .env changed (otherwise the app keeps serving stale config).
- name: "[{{ site.name }}] Cache config, routes, views, events"
  ansible.builtin.command:
    cmd: "php{{ php_version }} artisan {{ item }}"
    chdir: "{{ site_dir }}"
  become: true
  become_user: "{{ site.name }}"
  environment:
    HOME: "{{ site_home }}"
  loop:
    - config:cache
    - route:cache
    - view:cache
    - event:cache
  when: code_changed or env_render.changed
  changed_when: true
  notify: Restart kewlchats workers
