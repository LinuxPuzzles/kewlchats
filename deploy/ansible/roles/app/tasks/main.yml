---
# Deploy the same codebase once per site, each AS its own unprivileged user
# (created in the common role) for tenant isolation. The git deploy key is
# installed per-user inside deploy_site.yml (the user that clones owns the key).
- name: Deploy each site
  ansible.builtin.include_tasks: deploy_site.yml
  loop: "{{ sites }}"
  loop_control:
    loop_var: site
    label: "{{ site.name }} ({{ site.domain }})"
