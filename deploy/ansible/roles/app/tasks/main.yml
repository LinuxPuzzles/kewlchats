---
- name: Ensure root .ssh exists
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Install git deploy key
  ansible.builtin.copy:
    src: deploy_key
    dest: /root/.ssh/kewlchats_deploy
    owner: root
    group: root
    mode: "0600"

# Deploy the same codebase once per site (own dir, .env, DB, caches).
- name: Deploy each site
  ansible.builtin.include_tasks: deploy_site.yml
  loop: "{{ sites }}"
  loop_control:
    loop_var: site
    label: "{{ site.name }} ({{ site.domain }})"
