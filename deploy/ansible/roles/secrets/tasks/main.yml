---
# Generate-once secrets, persisted under {{ secrets_dir }} (one file per secret,
# 0600). Idempotent: a file is only created if absent, then slurped into a fact.
#
# Shared secrets:   redis_password, db_ejabberd_password (+ native-password hash)
# Per-site secrets: app_key_<name>, db_password_<name>, ejabberd_admin_password_<name>
# Per-site (minted by ejabberd, loaded here if present): xmpp_api_token_<name>
#
# Facts are flat and named after the file, so templates read e.g.
#   {{ lookup('vars', 'db_password_' ~ site.name) }}

- name: Ensure secrets directory exists
  ansible.builtin.file:
    path: "{{ secrets_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

# --- Shared random secrets ---
- name: Generate shared random secrets
  ansible.builtin.shell:
    cmd: "umask 077; openssl rand -hex 24 > {{ secrets_dir }}/{{ item }}"
    creates: "{{ secrets_dir }}/{{ item }}"
  loop:
    - redis_password
    - db_ejabberd_password

- name: Generate ejabberd DB native-password hash
  ansible.builtin.shell:
    cmd: >-
      umask 077;
      pw="$(cat {{ secrets_dir }}/db_ejabberd_password)";
      h="$(printf '%s' "$pw" | openssl dgst -binary -sha1 | openssl dgst -sha1 | sed 's/^.*= //' | tr 'a-f' 'A-F')";
      printf '*%s' "$h" > {{ secrets_dir }}/db_ejabberd_password_nathash
    creates: "{{ secrets_dir }}/db_ejabberd_password_nathash"

# --- Per-site secrets ---
- name: Generate per-site APP_KEY (base64 form)
  ansible.builtin.shell:
    cmd: "umask 077; printf 'base64:%s' \"$(openssl rand -base64 32)\" > {{ secrets_dir }}/app_key_{{ item.name }}"
    creates: "{{ secrets_dir }}/app_key_{{ item.name }}"
  loop: "{{ sites }}"
  loop_control:
    label: "{{ item.name }}"

- name: Generate per-site DB + ejabberd-admin passwords
  ansible.builtin.shell:
    cmd: "umask 077; openssl rand -hex 24 > {{ secrets_dir }}/{{ item.1 }}_{{ item.0.name }}"
    creates: "{{ secrets_dir }}/{{ item.1 }}_{{ item.0.name }}"
  loop: "{{ sites | product(['db_password', 'ejabberd_admin_password']) | list }}"
  loop_control:
    label: "{{ item.0.name }}/{{ item.1 }}"

- name: Mirror per-site ejabberd admin password to /root
  ansible.builtin.copy:
    src: "{{ secrets_dir }}/ejabberd_admin_password_{{ item.name }}"
    remote_src: true
    dest: "/root/kewlchats-ejabberd-admin-{{ item.name }}.txt"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ sites }}"
  loop_control:
    label: "{{ item.name }}"

# --- Load everything into flat facts ---
- name: Build the list of secret files to load
  ansible.builtin.set_fact:
    secret_file_names: >-
      {{ ['redis_password', 'db_ejabberd_password', 'db_ejabberd_password_nathash']
         + (sites | map(attribute='name') | map('regex_replace', '^', 'app_key_') | list)
         + (sites | map(attribute='name') | map('regex_replace', '^', 'db_password_') | list)
         + (sites | map(attribute='name') | map('regex_replace', '^', 'ejabberd_admin_password_') | list) }}

- name: Slurp secret files
  ansible.builtin.slurp:
    src: "{{ secrets_dir }}/{{ item }}"
  loop: "{{ secret_file_names }}"
  register: secret_slurps
  no_log: true

- name: Set secret facts
  ansible.builtin.set_fact:
    "{{ item.item }}": "{{ item.content | b64decode | trim }}"
  loop: "{{ secret_slurps.results }}"
  loop_control:
    label: "{{ item.item }}"
  no_log: true

# --- XMPP API tokens are minted by ejabberd (roles/ejabberd). Load any that
#     already exist so partial runs (e.g. --tags app) get the facts. ---
- name: Find existing XMPP API tokens
  ansible.builtin.find:
    paths: "{{ secrets_dir }}"
    patterns: "xmpp_api_token_*"
  register: api_token_files

- name: Slurp existing XMPP API tokens
  ansible.builtin.slurp:
    src: "{{ item.path }}"
  loop: "{{ api_token_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  register: api_token_slurps
  no_log: true

- name: Set XMPP API token facts
  ansible.builtin.set_fact:
    "{{ item.item.path | basename }}": "{{ item.content | b64decode | trim }}"
  loop: "{{ api_token_slurps.results }}"
  loop_control:
    label: "{{ item.item.path | basename }}"
  no_log: true
