---
- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Add NodeSource signing key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    owner: root
    group: root
    mode: "0644"

- name: Add NodeSource apt repository (Node {{ nodejs_major }})
  ansible.builtin.deb822_repository:
    name: nodesource
    types: [deb]
    uris: "https://deb.nodesource.com/node_{{ nodejs_major }}.x"
    suites: [nodistro]
    components: [main]
    signed_by: /etc/apt/keyrings/nodesource.asc
    state: present
  register: nodesource_repo

- name: Update apt cache after adding NodeSource
  ansible.builtin.apt:
    update_cache: true
  when: nodesource_repo.changed

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
