---
- name: Add ondrej/php PPA (PHP 8.5)
  ansible.builtin.apt_repository:
    repo: "ppa:ondrej/php"
    state: present
    update_cache: true

- name: Install PHP {{ php_version }} and extensions
  ansible.builtin.apt:
    name:
      - "php{{ php_version }}-fpm"
      - "php{{ php_version }}-cli"
      - "php{{ php_version }}-common"
      - "php{{ php_version }}-mysql"
      - "php{{ php_version }}-redis"
      - "php{{ php_version }}-mbstring"
      - "php{{ php_version }}-xml"
      - "php{{ php_version }}-curl"
      - "php{{ php_version }}-gd"
      - "php{{ php_version }}-bcmath"
      - "php{{ php_version }}-intl"
      - "php{{ php_version }}-zip"
      - "php{{ php_version }}-gmp"
    state: present
  notify: Restart php-fpm

- name: Install Composer
  ansible.builtin.get_url:
    url: https://getcomposer.org/installer
    dest: /tmp/composer-setup.php
    mode: "0644"
  changed_when: false

- name: Run Composer installer
  ansible.builtin.command:
    cmd: "php{{ php_version }} /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer"
    creates: /usr/local/bin/composer

# PHP directives applied to both FPM and CLI SAPIs.
- name: Deploy hardened php.ini drop-in (FPM + CLI)
  ansible.builtin.template:
    src: 99-kewlchats.ini.j2
    dest: "/etc/php/{{ php_version }}/{{ item }}/conf.d/99-kewlchats.ini"
    owner: root
    group: root
    mode: "0644"
  loop:
    - fpm
    - cli
  notify: Restart php-fpm

- name: Tune the FPM www pool
  community.general.ini_file:
    path: "/etc/php/{{ php_version }}/fpm/pool.d/www.conf"
    section: www
    option: "{{ item.opt }}"
    value: "{{ item.val }}"
    no_extra_spaces: true
    mode: "0644"
  loop:
    - { opt: "listen", val: "{{ php_fpm_socket }}" }
    - { opt: "listen.owner", val: "{{ app_user }}" }
    - { opt: "listen.group", val: "{{ app_group }}" }
    - { opt: "pm", val: "{{ php_fpm_pm }}" }
    - { opt: "pm.max_children", val: "{{ php_fpm_max_children }}" }
    - { opt: "pm.start_servers", val: "{{ php_fpm_start_servers }}" }
    - { opt: "pm.min_spare_servers", val: "{{ php_fpm_min_spare }}" }
    - { opt: "pm.max_spare_servers", val: "{{ php_fpm_max_spare }}" }
    - { opt: "pm.max_requests", val: "{{ php_fpm_max_requests }}" }
  notify: Restart php-fpm

- name: Enable and start php-fpm
  ansible.builtin.service:
    name: "php{{ php_version }}-fpm"
    enabled: true
    state: started
