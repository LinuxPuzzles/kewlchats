---
# Kept on apt_repository (deprecation is a far-off warning): the `ppa:` shorthand
# auto-resolves Launchpad's signing key. deb822_repository would force us to
# hardcode a key fingerprint, which is more brittle, not less.
- name: Add ondrej/php PPA (PHP 8.5)
  ansible.builtin.apt_repository:
    repo: "ppa:ondrej/php"
    state: present
    update_cache: true

- name: Install PHP {{ php_version }} and extensions
  ansible.builtin.apt:
    name:
      - "php{{ php_version }}-fpm"
      - "php{{ php_version }}-cli"
      - "php{{ php_version }}-common"
      - "php{{ php_version }}-mysql"
      - "php{{ php_version }}-redis"
      - "php{{ php_version }}-mbstring"
      - "php{{ php_version }}-xml"
      - "php{{ php_version }}-curl"
      - "php{{ php_version }}-gd"
      - "php{{ php_version }}-bcmath"
      - "php{{ php_version }}-intl"
      - "php{{ php_version }}-zip"
      - "php{{ php_version }}-gmp"
    state: present
  notify: Restart php-fpm

- name: Install Composer
  ansible.builtin.get_url:
    url: https://getcomposer.org/installer
    dest: /tmp/composer-setup.php
    mode: "0644"
  changed_when: false

- name: Run Composer installer
  ansible.builtin.command:
    cmd: "php{{ php_version }} /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer"
    creates: /usr/local/bin/composer

# PHP directives applied to both FPM and CLI SAPIs.
- name: Deploy hardened php.ini drop-in (FPM + CLI)
  ansible.builtin.template:
    src: 99-kewlchats.ini.j2
    dest: "/etc/php/{{ php_version }}/{{ item }}/conf.d/99-kewlchats.ini"
    owner: root
    group: root
    mode: "0644"
  loop:
    - fpm
    - cli
  notify: Restart php-fpm

# One FPM pool for the app, running as the `app_name` user. The package's default
# www-data pool is removed so only our pool/socket exists.
- name: Remove the default FPM pool (replaced by the app pool)
  ansible.builtin.file:
    path: "/etc/php/{{ php_version }}/fpm/pool.d/www.conf"
    state: absent
  notify: Restart php-fpm

- name: Deploy the application FPM pool
  ansible.builtin.template:
    src: pool.conf.j2
    dest: "/etc/php/{{ php_version }}/fpm/pool.d/{{ app_name }}.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Restart php-fpm

- name: Enable and start php-fpm
  ansible.builtin.service:
    name: "php{{ php_version }}-fpm"
    enabled: true
    state: started
