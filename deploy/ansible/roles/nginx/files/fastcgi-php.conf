# Managed by Ansible (kewlchats). Our own fastcgi-php snippet — the apt.host.toys
# (upstream) nginx build does NOT ship Ubuntu's snippets/fastcgi-php.conf.
# regex to split $uri into $fastcgi_script_name and $fastcgi_path_info
fastcgi_split_path_info ^(.+?\.php)(/.*)$;

# Don't pass a request to PHP unless the script actually exists.
try_files $fastcgi_script_name =404;

# try_files resets $fastcgi_path_info; restore it. http://trac.nginx.org/nginx/ticket/321
set $path_info $fastcgi_path_info;
fastcgi_param PATH_INFO $path_info;

fastcgi_index index.php;
include fastcgi.conf;
