# Managed by Ansible (kewlchats). Brotli (nginx-module-brotli, from apt.host.toys).
# Sits alongside gzip; brotli_static serves precompressed .br assets when present.
brotli on;
brotli_static on;
brotli_comp_level 4;
brotli_types
    application/atom+xml
    application/javascript
    application/json
    application/ld+json
    application/manifest+json
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-javascript
    application/xhtml+xml
    application/xml
    application/xml+rss
    font/opentype
    font/otf
    font/woff
    font/woff2
    image/svg+xml
    image/x-icon
    text/cache-manifest
    text/css
    text/javascript
    text/plain
    text/xml;
