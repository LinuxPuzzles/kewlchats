---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Generate DH parameters
  ansible.builtin.command:
    cmd: openssl dhparam -out /etc/nginx/dhparams.pem 2048
    creates: /etc/nginx/dhparams.pem

- name: Deploy global SSL/hardening drop-in
  ansible.builtin.template:
    src: 99-kewlchats-ssl.conf.j2
    dest: /etc/nginx/conf.d/99-kewlchats-ssl.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Deploy global catch-all (drops unknown-host traffic)
  ansible.builtin.copy:
    src: catchall.conf
    dest: /etc/nginx/conf.d/00-catchall.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Deploy per-site vhosts
  ansible.builtin.template:
    src: site.conf.j2
    dest: "/etc/nginx/sites-available/{{ item.name }}.conf"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ sites }}"
  loop_control:
    loop_var: site
    label: "{{ site.name }}"
  notify: Reload nginx

- name: Enable per-site vhosts
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ item.name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ item.name }}.conf"
    state: link
  loop: "{{ sites }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Reload nginx

- name: Disable the default vhost
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Enable and start nginx
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started
