---
- name: Install the queue worker unit
  ansible.builtin.template:
    src: worker.service.j2
    dest: "/etc/systemd/system/{{ app_name }}-worker.service"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart kewlchats workers

- name: Install the reconcile units
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ app_name }}-{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - reconcile.service
    - reconcile.timer
  notify: Reload systemd

- name: Enable and start the queue worker
  ansible.builtin.systemd_service:
    name: "{{ app_name }}-worker.service"
    enabled: true
    state: started
    daemon_reload: true

- name: Enable the reconcile timer
  ansible.builtin.systemd_service:
    name: "{{ app_name }}-reconcile.timer"
    enabled: true
    state: started
    daemon_reload: true
