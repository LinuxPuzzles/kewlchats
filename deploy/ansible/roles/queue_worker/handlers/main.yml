---
- name: Reload systemd
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Restart kewlchats workers
  ansible.builtin.systemd_service:
    name: "{{ item.name }}-worker.service"
    state: restarted
    daemon_reload: true
  loop: "{{ sites }}"
  loop_control:
    label: "{{ item.name }}"
