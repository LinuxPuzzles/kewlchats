---
- name: Set timezone to UTC
  community.general.timezone:
    name: Etc/UTC

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - ca-certificates
      - git
      - ufw
      - unzip
      - acl
      - fail2ban
      - unattended-upgrades
      - python3-pymysql
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: "0644"

# --- Service account ----------------------------------------------------------
# The app's code, PHP-FPM pool and queue worker run as one unprivileged user
# (`app_name`). Created here, early, because the php and app roles depend on it.
# A real shell (/bin/bash) is required so `become_user` can run command tasks.
- name: Create the app group
  ansible.builtin.group:
    name: "{{ app_name }}"
    state: present

- name: Create the app service user
  ansible.builtin.user:
    name: "{{ app_name }}"
    group: "{{ app_name }}"
    home: "{{ site_home_base }}/{{ app_name }}"
    shell: /bin/bash
    system: true
    create_home: true
    state: present

# --- File descriptors: ejabberd's #1 real-world gotcha (default 1024 caps ~1k conns) ---
- name: Raise global file descriptor limits (PAM)
  ansible.builtin.copy:
    dest: /etc/security/limits.d/90-kewlchats.conf
    content: |
      *  soft  nofile  100000
      *  hard  nofile  100000
      root soft nofile 100000
      root hard nofile 100000
    owner: root
    group: root
    mode: "0644"

- name: Kernel / network tuning
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-kewlchats.conf
    sysctl_set: true
    reload: true
  loop:
    - { name: fs.file-max, value: "2097152" }
    - { name: net.core.somaxconn, value: "65535" }
    - { name: net.ipv4.tcp_max_syn_backlog, value: "65535" }
    - { name: net.ipv4.ip_local_port_range, value: "1024 65535" }
    - { name: vm.swappiness, value: "10" }

# --- Swap backstop (OOM insurance on the 32GB box) ---
- name: Check for existing swap
  ansible.builtin.command: swapon --show
  register: swap_status
  changed_when: false

- name: Create swap file
  when: swap_status.stdout == ""
  block:
    - name: Allocate swap file
      ansible.builtin.command: fallocate -l 2G /swapfile
      args:
        creates: /swapfile
    - name: Secure swap file
      ansible.builtin.file:
        path: /swapfile
        owner: root
        group: root
        mode: "0600"
    - name: Format swap file
      ansible.builtin.command: mkswap /swapfile
      register: mkswap_out
      changed_when: "'Setting up swapspace' in mkswap_out.stdout"
    - name: Enable swap file
      ansible.builtin.command: swapon /swapfile
      changed_when: true
    - name: Persist swap in fstab
      ansible.posix.mount:
        path: none
        src: /swapfile
        fstype: swap
        opts: sw
        state: present

# --- SSH hardening ---
- name: Harden SSH
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/90-kewlchats.conf
    content: |
      # Managed by Ansible (kewlchats). Key-based auth only.
      PasswordAuthentication no
      PermitRootLogin prohibit-password
      PubkeyAuthentication yes
      PermitEmptyPasswords no
      X11Forwarding no
      MaxAuthTries 3
      ClientAliveInterval 300
      ClientAliveCountMax 2
    owner: root
    group: root
    mode: "0644"
    validate: "sshd -t -f %s"
  notify: Restart sshd

# --- fail2ban ---
- name: Configure fail2ban jails
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/kewlchats.local
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 5
      ignoreip = 127.0.0.1/8 ::1

      [sshd]
      enabled = true
      port = ssh
      maxretry = 3
      bantime = 86400

      [nginx-http-auth]
      enabled = true
      port = http,https
      logpath = /var/log/nginx/*error.log
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started
